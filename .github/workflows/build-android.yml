name: Build Android APK

on:
  push:
    branches: [main, claude/supabase-user-auth-vNtWk]
    tags:     ['v*']
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (debug / release)'
        required: false
        default: 'release'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Java 17 ───────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Android SDK ───────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. npm install ───────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 6. Build www/ (kopira web fajlove za Capacitor) ─────────
      - name: Build web assets
        run: npm run build

      # ── 7. Capacitor sync ────────────────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android

      # ── 8. Keystore (samo za release build) ─────────────────────
      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      # ── 9. Gradle build ──────────────────────────────────────────
      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        if: github.event.inputs.release_type == 'debug' || env.KEYSTORE_BASE64 == ''
        working-directory: android
        run: ./gradlew assembleDebug
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        if: github.event.inputs.release_type != 'debug' && env.KEYSTORE_BASE64 != ''
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_BASE64:    ${{ secrets.KEYSTORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}

      # ── 10. Upload APK artifact ───────────────────────────────────
      - name: Find APK file
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK)" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sumarija-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      # ── 11. GitHub Release (samo na tag) ─────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          name: "Šumarija ${{ github.ref_name }}"
          body: |
            ## Šumarija APK — ${{ github.ref_name }}

            ### Šta je novo
            - Vidjeti Git log za detalje promjena

            ### Instalacija na Android uređaj
            1. Preuzmite APK fajl ispod
            2. Otvorite fajl na telefonu
            3. Dozvolite instalaciju iz nepoznatih izvora
            4. Instalirajte

            ### Permissions
            - GPS (foreground + background) za snimanje vlaka
            - WAKE_LOCK za ekran durante snimanja
            - INTERNET za Supabase bazu podataka
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
