<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150">
  <!-- Shadow -->
  <ellipse cx="120" cy="143" rx="108" ry="7" fill="rgba(0,0,0,0.18)"/>

  <!-- ═══ WHEELS ═══ -->
  <!-- Front wheel -->
  <circle cx="52" cy="112" r="28" fill="#1a1a1a"/>
  <circle cx="52" cy="112" r="20" fill="#2a2a2a"/>
  <circle cx="52" cy="112" r="9"  fill="#111"/>
  <circle cx="52" cy="112" r="4"  fill="#555"/>
  <!-- Tread marks front -->
  <circle cx="52" cy="112" r="24" fill="none" stroke="#333" stroke-width="3" stroke-dasharray="6 6"/>

  <!-- Middle wheel -->
  <circle cx="120" cy="112" r="28" fill="#1a1a1a"/>
  <circle cx="120" cy="112" r="20" fill="#2a2a2a"/>
  <circle cx="120" cy="112" r="9"  fill="#111"/>
  <circle cx="120" cy="112" r="4"  fill="#555"/>
  <circle cx="120" cy="112" r="24" fill="none" stroke="#333" stroke-width="3" stroke-dasharray="6 6"/>

  <!-- Rear wheel -->
  <circle cx="192" cy="112" r="28" fill="#1a1a1a"/>
  <circle cx="192" cy="112" r="20" fill="#2a2a2a"/>
  <circle cx="192" cy="112" r="9"  fill="#111"/>
  <circle cx="192" cy="112" r="4"  fill="#555"/>
  <circle cx="192" cy="112" r="24" fill="none" stroke="#333" stroke-width="3" stroke-dasharray="6 6"/>

  <!-- ═══ FRAME / CHASSIS ═══ -->
  <!-- Front chassis bar -->
  <rect x="24" y="85" width="96" height="12" rx="2" fill="#1a4015"/>
  <!-- Rear chassis bar -->
  <rect x="118" y="85" width="98" height="12" rx="2" fill="#1a4015"/>
  <!-- Articulation joint -->
  <rect x="112" y="82" width="16" height="18" rx="3" fill="#0f2a0b"/>
  <circle cx="120" cy="91" r="5" fill="#333"/>
  <circle cx="120" cy="91" r="2" fill="#666"/>

  <!-- ═══ FRONT CAB ═══ -->
  <!-- Cab lower body -->
  <rect x="20" y="62" width="94" height="26" rx="3" fill="#367C2B"/>
  <!-- Cab upper (with window) -->
  <rect x="26" y="34" width="78" height="32" rx="4" fill="#367C2B"/>
  <!-- Cab roof curve -->
  <rect x="24" y="30" width="82" height="8" rx="4" fill="#2d6825"/>
  <!-- Front windshield (angled) -->
  <polygon points="30,34 96,34 100,46 26,46" fill="#a8d8ee" opacity="0.88"/>
  <!-- Side window -->
  <rect x="28" y="50" width="35" height="14" rx="2" fill="#86c5e0" opacity="0.75"/>
  <rect x="68" y="50" width="30" height="14" rx="2" fill="#86c5e0" opacity="0.75"/>
  <!-- Window frames -->
  <line x1="65" y1="50" x2="65" y2="64" stroke="#2d6825" stroke-width="2"/>
  <!-- Front grille / bumper -->
  <rect x="14" y="66" width="10" height="18" rx="2" fill="#2d6825"/>
  <!-- Headlights -->
  <rect x="12" y="68" width="7" height="5" rx="1" fill="#FFDE00"/>
  <rect x="12" y="76" width="7" height="4" rx="1" fill="#ff9900" opacity="0.9"/>
  <!-- Cab steps -->
  <rect x="18" y="82" width="8" height="4" rx="1" fill="#1a4015"/>
  <!-- JD badge -->
  <rect x="76" y="66" width="26" height="12" rx="2" fill="#FFDE00"/>
  <text x="89" y="75" font-family="Arial Black,Arial" font-size="8" font-weight="900" fill="#367C2B" text-anchor="middle">JD</text>

  <!-- ═══ CRANE ARM ═══ -->
  <!-- Crane base/tower -->
  <rect x="107" y="38" width="12" height="50" rx="2" fill="#FFDE00"/>
  <!-- Main boom (angled up-right) -->
  <rect x="108" y="16" width="8" height="38" rx="2" fill="#FFDE00" transform="rotate(25 112 38)"/>
  <!-- Inner boom -->
  <rect x="113" y="10" width="6" height="28" rx="2" fill="#e6c800" transform="rotate(10 116 24)"/>
  <!-- Grapple -->
  <circle cx="138" cy="18" r="6" fill="#FFDE00" stroke="#cc9900" stroke-width="1.5"/>
  <path d="M134,22 Q130,28 132,32 M142,22 Q146,28 144,32" stroke="#996600" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ═══ REAR LOG BUNK ═══ -->
  <!-- Bunk floor -->
  <rect x="128" y="66" width="84" height="20" rx="2" fill="#2d6825"/>
  <!-- Bunk stakes (vertical bars) -->
  <rect x="132" y="46" width="7" height="24" rx="2" fill="#1a4015"/>
  <rect x="150" y="42" width="7" height="28" rx="2" fill="#1a4015"/>
  <rect x="170" y="42" width="7" height="28" rx="2" fill="#1a4015"/>
  <rect x="190" y="42" width="7" height="28" rx="2" fill="#1a4015"/>
  <rect x="208" y="46" width="7" height="24" rx="2" fill="#1a4015"/>
  <!-- Horizontal bunk rail -->
  <rect x="130" y="42" width="88" height="5" rx="2" fill="#245020"/>

  <!-- Logs in bunk -->
  <ellipse cx="141" cy="53" rx="9"  ry="12" fill="#7a5c1e" stroke="#5a3e12" stroke-width="1"/>
  <ellipse cx="155" cy="50" rx="10" ry="13" fill="#8b6914" stroke="#6b4d0f" stroke-width="1"/>
  <ellipse cx="170" cy="49" rx="10" ry="14" fill="#7a5c1e" stroke="#5a3e12" stroke-width="1"/>
  <ellipse cx="185" cy="50" rx="9"  ry="13" fill="#8b6914" stroke="#6b4d0f" stroke-width="1"/>
  <ellipse cx="199" cy="51" rx="9"  ry="12" fill="#7a5c1e" stroke="#5a3e12" stroke-width="1"/>
  <ellipse cx="213" cy="53" rx="8"  ry="11" fill="#8b6914" stroke="#6b4d0f" stroke-width="1"/>
  <!-- Log end grain circles -->
  <circle cx="141" cy="53" r="5" fill="#5a3e12" opacity="0.6"/>
  <circle cx="155" cy="50" r="6" fill="#6b4d0f" opacity="0.6"/>
  <circle cx="170" cy="49" r="6" fill="#5a3e12" opacity="0.6"/>
  <circle cx="185" cy="50" r="5" fill="#6b4d0f" opacity="0.6"/>
  <circle cx="199" cy="51" r="5" fill="#5a3e12" opacity="0.6"/>
  <circle cx="213" cy="53" r="4" fill="#6b4d0f" opacity="0.6"/>

  <!-- Rear lights -->
  <rect x="222" y="70" width="7" height="5" rx="1" fill="#ff2222"/>
  <rect x="222" y="78" width="7" height="5" rx="1" fill="#ff8800" opacity="0.8"/>
</svg>
